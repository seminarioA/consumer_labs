server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy transparente hacia Ollama (red interna Docker) ─────────────────
    # Desde el navegador: fetch("http://localhost/ollama/api/generate", ...)
    # O bien configura la URL como http://localhost/ollama en el panel ⚙️
    location /ollama/ {
        proxy_pass         http://ollama:11434/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        # Streaming responses (generate)
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── Caché de assets estáticos ────────────────────────────────────────────
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Seguridad básica ─────────────────────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy        strict-origin-when-cross-origin;
}
