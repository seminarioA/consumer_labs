services:

  # ── Ollama + phi3:mini ──────────────────────────────────────────────────────
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: consumer-labs-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama   # persiste el modelo entre reinicios
    ports:
      - "11434:11434"               # acceso directo desde el host si lo necesitas
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s             # tiempo para que descargue el modelo

  # ── App React (nginx) ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pon tu clave de ElevenLabs en .env.local o como variable de entorno
        VITE_ELEVENLABS_API_KEY: ${VITE_ELEVENLABS_API_KEY:-}
    container_name: consumer-labs-app
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
    name: consumer-labs-ollama-models
