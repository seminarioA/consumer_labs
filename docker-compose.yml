# ─────────────────────────────────────────────────────────────────────────────
# Usa imágenes publicadas en Docker Hub (construidas por el pipeline de CI).
#
# Para levantar:
#   export DOCKERHUB_USERNAME=tuusuario
#   export IMAGE_TAG=latest              # o el tag/sha que quieras
#   docker compose pull && docker compose up -d
#
# Desarrollo local — compila desde código fuente:
#   cp docker-compose.override.yml.example docker-compose.override.yml
#   docker compose up --build
#
# Variables requeridas:
#   DOCKERHUB_USERNAME   → tu usuario de Docker Hub
#   IMAGE_TAG            → tag a desplegar (default: latest)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Ollama + phi3:mini ──────────────────────────────────────────────────────
  ollama:
    image: ${DOCKERHUB_USERNAME}/consumer-labs-ollama:${IMAGE_TAG:-latest}
    container_name: consumer-labs-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama   # persiste el modelo entre reinicios
    ports:
      - "11434:11434"               # acceso directo desde el host si lo necesitas
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags | grep -q phi3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 600s            # descarga de phi3:mini ~2.3 GB en conexión lenta

  # ── App React (nginx) ───────────────────────────────────────────────────────
  app:
    image: ${DOCKERHUB_USERNAME}/consumer-labs-app:${IMAGE_TAG:-latest}
    container_name: consumer-labs-app
    restart: unless-stopped
    # NOTA: VITE_ELEVENLABS_API_KEY NO va aquí.
    # Vite hornea las env vars en el bundle estático durante el build en CI.
    # El valor ya está dentro de la imagen publicada en Docker Hub.
    # Para cambiarlo hay que hacer un nuevo push al repo con el secreto actualizado.
    ports:
      - "80:80"
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
    name: consumer-labs-ollama-models
