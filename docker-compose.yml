# ─────────────────────────────────────────────────────────────────────────────
# PRODUCCIÓN — usa imágenes publicadas en Docker Hub.
# El CI construye las imágenes y hace push; el VPS SOLO las descarga y ejecuta.
#
# Despliegue en el VPS (lo hace el job "deploy" del pipeline automáticamente):
#   export DOCKERHUB_USERNAME=tuusuario
#   export IMAGE_TAG=sha-<commit>        # el CI lo calcula y lo pasa aquí
#   docker compose pull
#   docker compose up -d --remove-orphans
#
# Desarrollo local (necesitas crear docker-compose.override.yml desde el .example):
#   cp docker-compose.override.yml.example docker-compose.override.yml
#   docker compose up --build
#
# Variables requeridas (en .env.local o como vars de entorno del servidor):
#   DOCKERHUB_USERNAME   → tu usuario de Docker Hub
#   IMAGE_TAG            → tag a desplegar (default: latest)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Ollama + phi3:mini ──────────────────────────────────────────────────────
  ollama:
    image: ${DOCKERHUB_USERNAME}/consumer-labs-ollama:${IMAGE_TAG:-latest}
    container_name: consumer-labs-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama   # persiste el modelo entre reinicios
    ports:
      - "11434:11434"               # acceso directo desde el host si lo necesitas
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s             # margen para primera descarga del modelo

  # ── App React (nginx) ───────────────────────────────────────────────────────
  app:
    image: ${DOCKERHUB_USERNAME}/consumer-labs-app:${IMAGE_TAG:-latest}
    container_name: consumer-labs-app
    restart: unless-stopped
    # NOTA: VITE_ELEVENLABS_API_KEY NO va aquí.
    # Vite hornea las env vars en el bundle estático durante el build en CI.
    # El valor ya está dentro de la imagen publicada en Docker Hub.
    # Para cambiarlo hay que hacer un nuevo push al repo con el secreto actualizado.
    ports:
      - "80:80"
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama_data:
    name: consumer-labs-ollama-models
