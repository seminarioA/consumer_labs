name: Build & Push to Docker Hub

# ── Cómo funciona ──────────────────────────────────────────────────────────────
# 1. CI (GitHub Actions) construye las imágenes desde el código fuente.
# 2. Las sube al Docker Hub con tag SHA exacto + semver/latest.
# 3. El VPS NUNCA compila: solo hace `docker compose pull` + `up`.
# Esto garantiza que todos los entornos corren exactamente la misma imagen.
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}

jobs:
  # ── 1. Build + push: app React ──────────────────────────────────────────────
  build-app:
    name: App (React + nginx)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/consumer-labs-app
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            # latest solo en main/master
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_ELEVENLABS_API_KEY=${{ secrets.VITE_ELEVENLABS_API_KEY }}
          # scope único para no colisionar con el cache del job build-ollama
          cache-from: type=gha,scope=build-app
          cache-to: type=gha,mode=max,scope=build-app

  # ── 2. Build + push: Ollama + phi3:mini ─────────────────────────────────────
  build-ollama:
    name: Ollama (phi3:mini)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/consumer-labs-ollama
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ollama
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # scope único para no colisionar con el cache del job build-app
          cache-from: type=gha,scope=build-ollama
          cache-to: type=gha,mode=max,scope=build-ollama

  # ── 3. Deploy al VPS ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-app, build-ollama]       # espera a que AMBAS imágenes estén en Hub
    if: github.event_name != 'pull_request'

    steps:
      - name: Calcular short SHA
        id: sha
        run: echo "short=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            # Directorio en el VPS donde vive docker-compose.yml
            # Ajusta la ruta si es diferente
            cd /opt/consumer-labs

            # Usar el SHA exacto del commit para reproducibilidad total
            # Evita que "latest" apunte a algo distinto en cada nodo
            export DOCKERHUB_USERNAME=${{ vars.DOCKERHUB_USERNAME }}
            export IMAGE_TAG=sha-${{ steps.sha.outputs.short }}

            # Bajar las imágenes nuevas ANTES de bajar los contenedores
            # (minimiza downtime)
            docker compose pull

            # Levantar con la imagen nueva; eliminar contenedores huérfanos
            docker compose up -d --remove-orphans

            # Limpiar imágenes viejas para no llenar el disco
            docker image prune -f
