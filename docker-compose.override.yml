# docker-compose.override.yml — desarrollo local
# Docker Compose fusiona este archivo automáticamente con docker-compose.yml
# cuando ejecutas: docker compose up
#
# Sobreescribe "image:" con "build:" para compilar desde el código fuente local.

services:
  ollama:
    image: ""
    build:
      context: .
      dockerfile: Dockerfile.ollama

  app:
    image: ""
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ELEVENLABS_API_KEY: ${VITE_ELEVENLABS_API_KEY:-}
